<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horari Setmanal — Grup Quinze Ous</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;color:#1a1a1a;background:#f5f5f2}
input,select,button,textarea{font-family:Arial,sans-serif}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#fff;border:1px solid #ddd;border-radius:12px;padding:2.5rem 2rem;width:340px;max-width:95vw}
.login-logo{text-align:center;margin-bottom:1.75rem}
.login-logo div{font-size:22px;font-weight:700;color:#0F6E56}
.login-logo p{font-size:12px;color:#888;margin-top:4px}
.login-box label{display:block;font-size:11px;color:#666;margin-bottom:4px;margin-top:14px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.login-box input{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px;outline:none}
.login-box input:focus{border-color:#1D9E75}
.login-btn{width:100%;margin-top:20px;padding:11px;background:#0F6E56;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer}
.login-btn:hover{background:#085041}
.login-error{color:#c0392b;font-size:12px;margin-top:10px;text-align:center;min-height:18px}
.login-hint{font-size:11px;color:#aaa;text-align:center;margin-top:16px;line-height:1.6}

/* APP */
#app{display:none}
header{background:#0F6E56;color:#fff;padding:11px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
header h1{font-size:15px;font-weight:700;flex:1}
.week-nav{display:flex;align-items:center;gap:6px}
.week-label{font-size:12px;font-weight:700;min-width:170px;text-align:center}
.hbtn{padding:5px 12px;border:1px solid rgba(255,255,255,.35);border-radius:6px;background:transparent;color:#fff;cursor:pointer;font-size:12px}
.hbtn:hover{background:rgba(255,255,255,.15)}
.user-badge{font-size:11px;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:6px}
.logout-btn{background:transparent;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:11px}
.logout-btn:hover{color:#fff}

.legend{display:flex;gap:12px;padding:8px 16px;background:#fff;border-bottom:1px solid #e5e5e0;flex-wrap:wrap;align-items:center}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
.leg-dot{width:9px;height:9px;border-radius:50%}
.leg-box{width:16px;height:10px;border-radius:2px}
.leg-sep{width:1px;height:14px;background:#ddd}

.main{padding:12px 16px;overflow-x:auto}
.loading{text-align:center;padding:3rem;color:#888;font-size:14px}

table{border-collapse:collapse;width:100%;min-width:700px}
th{padding:7px 8px;font-size:11px;font-weight:700;text-align:left;border:1px solid #ddd;white-space:nowrap}
td{border:1px solid #e0e0d8;vertical-align:top;padding:0}
.th-loc{background:#0F6E56;color:#fff;width:105px;text-transform:uppercase;font-size:10px}
.th-torn{background:#1D9E75;color:#fff;width:63px;text-align:center;text-transform:uppercase;font-size:10px}
.th-dia{background:#E1F5EE;color:#085041;text-align:center;min-width:100px}
.th-dia small{font-weight:400;font-size:10px;display:block}
.loc-cell{padding:9px 7px;font-weight:700;font-size:11px;vertical-align:middle;text-align:center;line-height:1.4}
.loc-cell small{font-weight:400;font-size:10px;display:block;margin-top:2px;opacity:.7}
.torn-cell{padding:5px 6px;font-size:10px;font-weight:700;text-align:center;vertical-align:middle;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.torn-migdia{background:#FFF9DB;color:#854F0B}
.torn-nit{background:#E8EAF6;color:#283593}
.day-cell{padding:4px 5px;min-height:40px;vertical-align:top}

.chip{display:flex;align-items:center;gap:3px;padding:3px 5px;border-radius:5px;margin-bottom:2px;font-size:11px;cursor:pointer;transition:opacity .1s;position:relative}
.chip:hover{opacity:.85}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chip-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:68px}
.chip-hores{font-size:10px;opacity:.75;white-space:nowrap}
.chip-badge{font-size:9px;padding:1px 3px;border-radius:3px;background:rgba(0,0,0,.1);font-weight:700;margin-left:1px}
.chip-actions{display:none;position:absolute;right:2px;top:50%;transform:translateY(-50%);gap:2px;background:inherit;padding-left:4px}
.chip:hover .chip-actions{display:flex}
.chip-btn{background:none;border:none;cursor:pointer;font-size:11px;padding:1px 3px;border-radius:3px;color:inherit;opacity:.6}
.chip-btn:hover{opacity:1;background:rgba(0,0,0,.1)}

.add-btn{display:flex;align-items:center;gap:3px;padding:3px 5px;border:1px dashed #bbb;border-radius:5px;font-size:11px;color:#aaa;cursor:pointer;margin-top:2px;background:transparent;transition:all .12s;width:100%}
.add-btn:hover{border-color:#1D9E75;color:#0F6E56;background:#E1F5EE}
.loc-sep td{height:4px;background:#d0d0c8;padding:0}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.4rem;width:340px;max-width:95vw}
.modal h3{font-size:14px;font-weight:700;margin-bottom:2px}
.modal-sub{font-size:12px;color:#888;margin-bottom:1rem}
.type-toggle{display:flex;border:1px solid #ddd;border-radius:6px;overflow:hidden;margin-bottom:10px}
.type-opt{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:12px;font-weight:700;color:#888;background:#fff;border:none}
.type-opt.active-fix{background:#E1F5EE;color:#085041}
.type-opt.active-extra{background:#FFF9DB;color:#854F0B}
.fix-info{font-size:11px;color:#666;background:#f5f5f2;border-radius:6px;padding:7px 9px;margin-bottom:10px;line-height:1.55}
.frow{display:flex;flex-direction:column;gap:3px;margin-bottom:9px}
.frow label{font-size:11px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.frow input,.frow select{padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;outline:none;width:100%;background:#fff;color:#1a1a1a}
.frow input:focus,.frow select:focus{border-color:#1D9E75}
.row2{display:flex;gap:10px}
.row2 .frow{flex:1}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.mbtn{padding:7px 16px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#333;cursor:pointer;font-size:13px;font-weight:700}
.mbtn.ok{background:#0F6E56;border-color:#0F6E56;color:#fff}
.mbtn.ok:hover{background:#085041}
.mbtn.danger{background:#fff;border-color:#e74c3c;color:#e74c3c}


/* AUTOCOMPLETE */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #1D9E75;border-top:none;border-radius:0 0 6px 6px;z-index:300;max-height:160px;overflow-y:auto;display:none}
.ac-list.open{display:block}
.ac-item{padding:8px 10px;cursor:pointer;font-size:13px;border-bottom:0.5px solid #f0f0f0}
.ac-item:hover,.ac-item.active{background:#E1F5EE;color:#085041}

/* COPY MODAL */
.copy-days{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
.copy-day{padding:6px;border:1px solid #ddd;border-radius:6px;text-align:center;cursor:pointer;font-size:11px;font-weight:700;transition:all .12s}
.copy-day:hover,.copy-day.selected{background:#E1F5EE;border-color:#1D9E75;color:#085041}


/* DRAG & DROP */
.chip{cursor:grab}
.chip.dragging{opacity:.4;cursor:grabbing}
.chip.drag-over{border-top:2px solid #1D9E75}
.drag-handle{font-size:10px;opacity:.3;cursor:grab;padding:0 2px;flex-shrink:0;user-select:none}
.drag-handle:hover{opacity:.7}


/* MODAL PERSONA */
.persona-modal{background:#fff;border-radius:12px;padding:1.4rem;width:520px;max-width:96vw;max-height:85vh;overflow-y:auto}
.persona-select{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.persona-select select{flex:1;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;outline:none}
.persona-select select:focus{border-color:#1D9E75}
.persona-week-nav{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.persona-week-lbl{font-size:12px;font-weight:700;flex:1;text-align:center}
.p-empty{text-align:center;color:#aaa;padding:2rem;font-size:13px}
.p-day{margin-bottom:10px}
.p-day-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#666;padding:4px 0;border-bottom:1px solid #eee;margin-bottom:6px}
.p-torn{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;margin-bottom:4px;font-size:12px}
.p-torn-loc{font-weight:700;flex:1}
.p-torn-info{font-size:11px;color:#888}
.p-total{background:#E1F5EE;color:#085041;border-radius:6px;padding:8px 12px;font-size:12px;font-weight:700;text-align:center;margin-top:12px}
.p-print-btn{width:100%;margin-top:10px;padding:8px;background:#0F6E56;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
.p-print-btn:hover{background:#085041}


/* ABSENCIES */
.chip.absent{opacity:.5;text-decoration:line-through;border-left-color:#e74c3c!important;background:#fee!important;color:#c0392b!important}
.chip-absent-btn{background:none;border:none;cursor:pointer;font-size:10px;padding:1px 3px;border-radius:3px;color:inherit;opacity:.5}
.chip-absent-btn:hover{opacity:1;background:rgba(0,0,0,.1)}
.chip-absent-btn.active{opacity:1;color:#e74c3c}

/* MODAL MES */
.mes-modal{background:#fff;border-radius:12px;padding:1.4rem;width:700px;max-width:97vw;max-height:88vh;overflow-y:auto}
.mes-nav{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.mes-lbl{font-size:13px;font-weight:700;flex:1;text-align:center}
.mes-persona-sel{display:flex;gap:8px;margin-bottom:1rem}
.mes-persona-sel select{flex:1;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;outline:none}
.mes-persona-sel select:focus{border-color:#1D9E75}
.mes-setmana{margin-bottom:14px}
.mes-setmana-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#fff;background:#1D9E75;padding:5px 10px;border-radius:5px;margin-bottom:6px}
.mes-torn{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:5px;margin-bottom:3px;font-size:12px}
.mes-torn.absent-row{opacity:.5;text-decoration:line-through;background:#fee!important;color:#c0392b!important}
.mes-torn-dia{font-weight:700;width:80px;flex-shrink:0}
.mes-torn-loc{flex:1}
.mes-torn-info{font-size:11px;color:#888;white-space:nowrap}
.mes-total{background:#E1F5EE;color:#085041;border-radius:6px;padding:8px 12px;font-size:13px;font-weight:700;text-align:center;margin-top:12px}

@media print{header .week-nav,.hbtn,.add-btn,.chip-btn,.chip-actions,.logout-btn{display:none!important}body{background:#fff}.main{padding:4px}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div>Grup Quinze Ous</div>
      <p>Gestió d'horaris setmanals</p>
    </div>
    <label>Usuari</label>
    <input type="text" id="login-user" placeholder="Usuari" autocomplete="username">
    <label>Contrasenya</label>
    <input type="password" id="login-pass" placeholder="Contrasenya" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-err"></div>
    <div class="login-hint">Contacta amb l'administrador si no recordes les credencials.</div>
  </div>
</div>

<div id="app">
  <header>
    <h1>Grup Quinze Ous — Horari Setmanal</h1>
    <div class="week-nav">
      <button class="hbtn" onclick="changeWeek(-1)">&#8592;</button>
      <div class="week-label" id="week-lbl"></div>
      <button class="hbtn" onclick="changeWeek(1)">&#8594;</button>
    </div>
    <button class="hbtn" onclick="window.print()">Imprimir</button>
    <button class="hbtn" onclick="openHorariPersona()">Per persona</button>
    <button class="hbtn" onclick="openHorariMes()">Per mes</button>
    <div class="user-badge">
      <span id="user-display"></span>
      <button class="logout-btn" onclick="doLogout()">&#10005;</button>

  <div class="legend">

    <div class="leg-item"><div class="leg-box" style="background:#FFFBEB;border-left:2px solid #FCD34D"></div>Extra</div>
  </div>

  <div class="main">
    <div class="loading" id="loading">Carregant horaris...</div>
    <table id="main-table" style="display:none"></table>
  </div>
</div>

<!-- MODAL AFEGIR/EDITAR -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="frow" id="tipus-row">
      <label>Tipus</label>
      <div class="type-toggle">
        <button class="type-opt active-fix" id="opt-fix" onclick="setTipus('fix')">Fix — totes les setmanes</button>
        <button class="type-opt" id="opt-extra" onclick="setTipus('extra')">Extra — sols aquest dia</button>
      </div>
    </div>
    <div class="fix-info" id="fix-info"></div>
    <div class="frow"><label>Nom</label>
      <div class="ac-wrap">
        <input id="m-nom" placeholder="Nom i cognoms" autocomplete="off" oninput="onNomInput()" onkeydown="onNomKey(event)">
        <div class="ac-list" id="ac-list"></div>
      </div>
    </div>
    <div class="frow"><label>Rol</label>
      <select id="m-rol">
        <option value="cuina">Cuina</option>
        <option value="sala">Sala</option>
        <option value="neteja">Neteja</option>
      </select>
    </div>
    <div class="row2">
      <div class="frow"><label>Inici</label><input id="m-ini" type="time" value="09:00"></div>
      <div class="frow"><label>Fi</label><input id="m-fi" type="time" value="17:00"></div>
    </div>
    <div class="modal-btns">
      <button class="mbtn danger" id="btn-delete" onclick="deleteWorker()" style="display:none;margin-right:auto">Eliminar</button>
      <button class="mbtn" onclick="closeModal()">Cancel·lar</button>
      <button class="mbtn ok" id="btn-save" onclick="saveWorker()">Afegir</button>
    </div>
  </div>
</div>

<!-- MODAL COPIAR -->
<div class="modal-overlay" id="copy-overlay">
  <div class="modal">
    <h3>Copiar a un altre dia</h3>
    <div class="modal-sub" id="copy-sub"></div>
    <div class="frow"><label>Setmana</label>
      <select id="copy-week">
        <option value="0">Aquesta setmana</option>
        <option value="1">Setmana que ve</option>
        <option value="2">D'aquí 2 setmanes</option>
        <option value="-1">Setmana passada</option>
      </select>
    </div>
    <div class="frow"><label>Dia</label>
      <div class="copy-days" id="copy-days"></div>
    </div>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeCopyModal()">Cancel·lar</button>
      <button class="mbtn ok" onclick="doCopy()">Copiar</button>
    </div>
  </div>
</div>


<!-- MODAL MES -->
<div class="modal-overlay" id="mes-overlay">
  <div class="mes-modal">
    <h3 style="margin-bottom:.75rem">Horari mensual per persona</h3>
    <div class="mes-persona-sel">
      <select id="mes-persona-sel" onchange="renderMes()">
        <option value="">— Selecciona un treballador —</option>
      </select>
    </div>
    <div class="mes-nav">
      <button class="mbtn" onclick="changeMes(-1)">&#8592;</button>
      <div class="mes-lbl" id="mes-lbl"></div>
      <button class="mbtn" onclick="changeMes(1)">&#8594;</button>
    </div>
    <div id="mes-content"></div>
    <button class="p-print-btn" onclick="printMes()">Descarregar / Imprimir</button>
    <div class="modal-btns" style="margin-top:.75rem">
      <button class="mbtn" onclick="closeMesModal()">Tancar</button>
    </div>
  </div>
</div>

<!-- MODAL PERSONA -->
<div class="modal-overlay" id="persona-overlay">
  <div class="persona-modal">
    <h3 style="margin-bottom:.75rem">Horari per persona</h3>
    <div class="persona-select">
      <select id="persona-sel" onchange="renderPersona()">
        <option value="">— Selecciona un treballador —</option>
      </select>
    </div>
    <div class="persona-week-nav">
      <button class="mbtn" onclick="changePersonaWeek(-1)">&#8592;</button>
      <div class="persona-week-lbl" id="persona-week-lbl"></div>
      <button class="mbtn" onclick="changePersonaWeek(1)">&#8594;</button>
    </div>
    <div id="persona-content"></div>
    <button class="p-print-btn" onclick="printPersona()">Imprimir aquest horari</button>
    <div class="modal-btns" style="margin-top:.75rem">
      <button class="mbtn" onclick="closePersonaModal()">Tancar</button>
    </div>
  </div>
</div>

// ── LOGIN ─────────────────────────────────────────────────────────
function doLogin(){
  const u = document.getElementById('login-user').value.trim().toLowerCase();
  const p = document.getElementById('login-pass').value;
  if(USERS[u] && USERS[u].pass === p){
    currentUser = {username:u, ...USERS[u]};
    document.getElementById('login-err').textContent = '';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-display').textContent = currentUser.label;
    loadData();
  } else {
    document.getElementById('login-err').textContent = 'Usuari o contrasenya incorrectes.';
  }
}
function doLogout(){
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

// ── DADES SUPABASE ────────────────────────────────────────────────
async function loadData(){
  document.getElementById('loading').style.display = 'block';
  document.getElementById('main-table').style.display = 'none';
  const [f, e, a] = await Promise.all([
    sb.from('fixos').select('*').order('ordre').order('created_at'),
    sb.from('extres').select('*').order('ordre').order('created_at'),
    sb.from('absencies').select('*'),
  ]);
  fixosData     = f.data || [];
  extresData    = e.data || [];
  absenciesData = a.data || [];
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main-table').style.display = '';
  renderTable();
}

// ── SETMANA ───────────────────────────────────────────────────────
function weekStart(off){
  const d = new Date(); d.setHours(0,0,0,0);
  const dow = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate()-(dow===0?6:dow-1)+off*7);
  return mon;
}
function dateKey(d){ return d.toISOString().split('T')[0] }
function getDayDate(di){
  const ws = weekStart(weekOffset);
  const d = new Date(ws); d.setDate(ws.getDate()+di);
  return d;
}
function getDiaSem(d){ return d.getDay()===0?6:d.getDay()-1 }
function fmtWeek(){
  const ws = weekStart(weekOffset);
  const we = new Date(ws); we.setDate(ws.getDate()+6);
  return `${ws.getDate()} ${MESOS[ws.getMonth()]} – ${we.getDate()} ${MESOS[we.getMonth()]} ${we.getFullYear()}`;
}
function changeWeek(n){ weekOffset+=n; renderTable(); }

function getWorkers(locId,torn,di){
  const d = getDayDate(di);
  const dk = dateKey(d);
  const ds = getDiaSem(d);
  const fs = fixosData.filter(w=>w.loc_id===locId&&w.torn===torn&&w.dia_setmana===ds).map(w=>({...w,tipus:'fix'}));
  const es = extresData.filter(w=>w.loc_id===locId&&w.torn===torn&&w.data_dia===dk).map(w=>({...w,tipus:'extra'}));
  return [...fs,...es];
}

// ── RENDER ────────────────────────────────────────────────────────
function renderTable(){
  document.getElementById('week-lbl').textContent = fmtWeek();
  const isAdmin = currentUser.rol === 'admin';
  const isVisor = currentUser.rol === 'visor';
  const canEdit = isAdmin;
  const myLoc   = currentUser.loc;
  const visibleLocs = (isAdmin||isVisor) ? LOCS : LOCS.filter(l=>l.id===myLoc);

  const ws = weekStart(weekOffset);
  let html = '<thead><tr>';
  html += `<th class="th-loc">Establiment</th><th class="th-torn">Torn</th>`;
  DIES.forEach((d,i)=>{
    const day = new Date(ws); day.setDate(ws.getDate()+i);
    html += `<th class="th-dia">${d}<small>${day.getDate()}/${day.getMonth()+1}</small></th>`;
  });
  html += '</tr></thead><tbody>';

  visibleLocs.forEach((loc,li)=>{
    TORNS.forEach((torn,ti)=>{
      html += '<tr>';
      if(ti===0){
        html += `<td class="loc-cell" rowspan="2" style="background:${loc.bg};color:${loc.tc};border-left:3px solid ${loc.color}">${loc.nom}<small>${loc.empresa}</small></td>`;
      }
      const tc = torn==='Migdia'?'torn-migdia':'torn-nit';
      html += `<td class="torn-cell ${tc}">${torn}</td>`;
      DIES.forEach((_,di)=>{
        const workers = getWorkers(loc.id,torn,di);
        const d = getDayDate(di);
        const dk = dateKey(d);
        html += `<td class="day-cell">`;
        workers.forEach(w=>{
          const isFix = w.tipus==='fix';
          const isAbsent = absenciesData.some(a=>a.worker_id===w.id && a.data_dia===dk);
          const chipStyle = isAbsent ? 'background:#fee;color:#c0392b;border-left:2px solid #e74c3c' : isFix
            ? `background:${ROL_BG[w.rol]};color:${ROL_TC[w.rol]};border-left:2px solid ${ROL_COLOR[w.rol]}`
            : `background:#FFFBEB;color:#92400e;border-left:2px solid #FCD34D`;
          html += `<div class="chip" style="${chipStyle}"
            draggable="${canEdit}"
            data-id="${w.id}" data-tipus="${w.tipus}" data-loc="${loc.id}" data-torn="${torn}" data-di="${di}" data-dk="${dk}"
            ${canEdit?`onclick="openEdit('${w.id}','${w.tipus}','${loc.id}','${torn}',${di},'${dk}')"
            ondragstart="onDragStart(event)" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragend="onDragEnd(event)"`:''}>
            ${canEdit?'<span class="drag-handle" onclick="event.stopPropagation()">&#9776;</span>':''}
            <div class="chip-dot" style="background:${ROL_COLOR[w.rol]}"></div>
            <span class="chip-name" title="${w.nom}">${w.nom}</span>
            <span class="chip-hores">${w.hora_ini}-${w.hora_fi}</span>
            <span class="chip-badge">${isFix?'fix':'extra'}</span>
            ${canEdit?`<span class="chip-actions">
              <button class="chip-btn" title="Copiar" onclick="openCopy(event,'${w.id}','${w.tipus}','${loc.id}','${torn}',${di})">&#9112;</button>
              <button class="chip-absent-btn${isAbsent?' active':''}" title="${isAbsent?'Treure absència':'Marcar absent'}" onclick="toggleAbsent(event,'${w.id}','${w.tipus}','${dk}')">&#10006;</button>
            </span>`:''}
          </div>`;
        });
        if(canEdit){
          html += `<button class="add-btn" onclick="openAdd('${loc.id}','${torn}',${di},'${dk}')">+ afegir</button>`;
        }
        html += `</td>`;
      });
      html += '</tr>';
    });
    if(li<visibleLocs.length-1){
      html += `<tr class="loc-sep"><td colspan="${2+DIES.length}"></td></tr>`;
    }
  });
  html += '</tbody>';
  document.getElementById('main-table').innerHTML = html;
}

// ── MODAL AFEGIR ──────────────────────────────────────────────────
function openAdd(locId,torn,di,dk){
  const d = getDayDate(di);
  const loc = LOCS.find(l=>l.id===locId);
  pending = {locId,torn,di,dk,diaSem:getDiaSem(d)};
  editingId = null;
  document.getElementById('modal-title').textContent = `${loc.nom} · ${torn}`;
  document.getElementById('modal-sub').textContent   = `${DIES[di]}, ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
  document.getElementById('m-nom').value = '';
  document.getElementById('m-rol').value = 'cuina';
  document.getElementById('m-ini').value = '09:00';
  document.getElementById('m-fi').value  = '17:00';
  document.getElementById('tipus-row').style.display = '';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('btn-save').textContent = 'Afegir';
  setTipus('fix');
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-nom').focus(),60);
}

function openEdit(id,tipus,locId,torn,di,dk){
  const d = getDayDate(di);
  const loc = LOCS.find(l=>l.id===locId);
  const arr = tipus==='fix'?fixosData:extresData;
  const w = arr.find(x=>x.id===id);
  if(!w) return;
  pending = {locId,torn,di,dk,diaSem:getDiaSem(d)};
  editingId = {id,tipus};
  document.getElementById('modal-title').textContent = `Editar — ${loc.nom} · ${torn}`;
  document.getElementById('modal-sub').textContent   = `${DIES[di]}, ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
  document.getElementById('m-nom').value = w.nom;
  document.getElementById('m-rol').value = w.rol;
  document.getElementById('m-ini').value = w.hora_ini;
  document.getElementById('m-fi').value  = w.hora_fi;
  document.getElementById('tipus-row').style.display = 'none';
  document.getElementById('btn-delete').style.display = '';
  document.getElementById('btn-save').textContent = 'Guardar';
  tipusActual = tipus;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-nom').focus(),60);
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  pending = null; editingId = null;
}

function setTipus(t){
  tipusActual = t;
  document.getElementById('opt-fix').className   = 'type-opt'+(t==='fix'?' active-fix':'');
  document.getElementById('opt-extra').className = 'type-opt'+(t==='extra'?' active-extra':'');
  document.getElementById('fix-info').innerHTML  = t==='fix'
    ? 'Apareixerà a <strong>totes les setmanes</strong> en aquest lloc, torn i dia de la setmana.'
    : 'Apareixerà <strong>únicament aquest dia</strong> concret.';
}

async function saveWorker(){
  if(!pending) return;
  const nom = document.getElementById('m-nom').value.trim();
  if(!nom) return;
  const w = {
    nom, rol:document.getElementById('m-rol').value,
    hora_ini:document.getElementById('m-ini').value||'09:00',
    hora_fi:document.getElementById('m-fi').value||'17:00',
  };

  if(editingId){
    const table = editingId.tipus==='fix'?'fixos':'extres';
    await sb.from(table).update(w).eq('id',editingId.id);
  } else {
    if(tipusActual==='fix'){
      await sb.from('fixos').insert({...w,loc_id:pending.locId,torn:pending.torn,dia_setmana:pending.diaSem,ordre:0});
    } else {
      await sb.from('extres').insert({...w,loc_id:pending.locId,torn:pending.torn,data_dia:pending.dk,ordre:0});
    }
  }
  closeModal();
  await loadData();
}

async function deleteWorker(){
  if(!editingId) return;
  if(!confirm('Eliminar aquest treballador?')) return;
  const table = editingId.tipus==='fix'?'fixos':'extres';
  await sb.from(table).delete().eq('id',editingId.id);
  closeModal();
  await loadData();
}

// ── MODAL COPIAR ──────────────────────────────────────────────────
function openCopy(e,id,tipus,locId,torn,di){
  e.stopPropagation();
  const arr = tipus==='fix'?fixosData:extresData;
  const w = arr.find(x=>x.id===id);
  if(!w) return;
  copySource = {w,locId,torn};
  copyDaySelected = null;
  document.getElementById('copy-sub').textContent = `${w.nom} · ${w.hora_ini}-${w.hora_fi}`;
  document.getElementById('copy-week').value = '0';
  renderCopyDays();
  document.getElementById('copy-overlay').classList.add('open');
}

function renderCopyDays(){
  const html = DIES.map((d,i)=>
    `<div class="copy-day${copyDaySelected===i?' selected':''}" onclick="selectCopyDay(${i})">${d}</div>`
  ).join('');
  document.getElementById('copy-days').innerHTML = html;
}

function selectCopyDay(i){
  copyDaySelected = i;
  renderCopyDays();
}

function closeCopyModal(){
  document.getElementById('copy-overlay').classList.remove('open');
  copySource = null; copyDaySelected = null;
}

async function doCopy(){
  if(copyDaySelected===null){alert('Selecciona un dia');return}
  const off = +document.getElementById('copy-week').value;
  const ws = weekStart(weekOffset+off);
  const d = new Date(ws); d.setDate(ws.getDate()+copyDaySelected);
  const dk = dateKey(d);
  const {w,locId,torn} = copySource;
  await sb.from('extres').insert({
    nom:w.nom, rol:w.rol, hora_ini:w.hora_ini, hora_fi:w.hora_fi,
    loc_id:locId, torn, data_dia:dk, ordre:0
  });
  closeCopyModal();
  await loadData();
}





// ── ABSÈNCIES ─────────────────────────────────────────────────────
async function toggleAbsent(e, workerId, tipus, dk){
  e.stopPropagation();
  const existing = absenciesData.find(a=>a.worker_id===workerId && a.data_dia===dk);
  if(existing){
    await sb.from('absencies').delete().eq('id', existing.id);
  } else {
    await sb.from('absencies').insert({worker_id: workerId, data_dia: dk, tipus});
  }
  await loadData();
}

// ── HORARI MES ────────────────────────────────────────────────────
let mesOffset = 0;

function openHorariMes(){
  const sel = document.getElementById('mes-persona-sel');
  const noms = getAllKnownNames();
  sel.innerHTML = '<option value="">— Selecciona un treballador —</option>' +
    noms.map(n=>`<option value="${n}">${n}</option>`).join('');
  renderMesLabel();
  document.getElementById('mes-content').innerHTML = '';
  document.getElementById('mes-overlay').classList.add('open');
}

function closeMesModal(){
  document.getElementById('mes-overlay').classList.remove('open');
}

function changeMes(n){
  mesOffset += n;
  renderMesLabel();
  renderMes();
}

function renderMesLabel(){
  const d = new Date();
  d.setMonth(d.getMonth() + mesOffset);
  document.getElementById('mes-lbl').textContent =
    MESOS_LLARGS[d.getMonth()] + ' ' + d.getFullYear();
}

const MESOS_LLARGS = ['Gener','Febrer','Març','Abril','Maig','Juny','Juliol','Agost','Setembre','Octubre','Novembre','Desembre'];

function getMesDays(){
  const d = new Date();
  d.setDate(1);
  d.setMonth(d.getMonth() + mesOffset);
  const any = d.getFullYear();
  const mes = d.getMonth();
  const dies = [];
  const cur = new Date(any, mes, 1);
  while(cur.getMonth() === mes){
    dies.push(new Date(cur));
    cur.setDate(cur.getDate()+1);
  }
  return dies;
}

function renderMes(){
  const nom = document.getElementById('mes-persona-sel').value;
  const cont = document.getElementById('mes-content');
  if(!nom){ cont.innerHTML = '<div class="p-empty">Selecciona un treballador.</div>'; return; }

  const dies = getMesDays();
  let totalMins = 0;
  let html = '';
  let setmanaActual = null;
  let setmanaHtml = '';

  dies.forEach(d => {
    const dk = dateKey(d);
    const ds = getDiaSem(d);
    const diaNum = d.getDay()===0?6:d.getDay()-1;

    // Nou bloc setmanal
    const ws = new Date(d);
    ws.setDate(d.getDate() - diaNum);
    const wsKey = dateKey(ws);
    if(wsKey !== setmanaActual){
      if(setmanaHtml) html += `<div class="mes-setmana">${setmanaHtml}</div>`;
      const we = new Date(ws); we.setDate(ws.getDate()+6);
      setmanaHtml = `<div class="mes-setmana-hdr">${ws.getDate()}/${ws.getMonth()+1} – ${we.getDate()}/${we.getMonth()+1}</div>`;
      setmanaActual = wsKey;
    }

    const tornsDelDia = [];
    LOCS.forEach(loc=>{
      TORNS.forEach(torn=>{
        const fs = fixosData.filter(w=>w.nom===nom&&w.loc_id===loc.id&&w.torn===torn&&w.dia_setmana===ds);
        const es = extresData.filter(w=>w.nom===nom&&w.loc_id===loc.id&&w.torn===torn&&w.data_dia===dk);
        ;[...fs,...es].forEach(w=>{
          const isAbsent = absenciesData.some(a=>a.worker_id===w.id && a.data_dia===dk);
          const ini = w.hora_ini.split(':').map(Number);
          const fi  = w.hora_fi.split(':').map(Number);
          let fiMins2 = fi[0]*60+fi[1];
          if(fiMins2 === 0) fiMins2 = 24*60;
          const mins = fiMins2 - (ini[0]*60+ini[1]);
          if(!isAbsent) totalMins += mins > 0 ? mins : 0;
          tornsDelDia.push({loc, torn, ini:w.hora_ini, fi:w.hora_fi, rol:w.rol, isAbsent});
        });
      });
    });

    tornsDelDia.forEach(t=>{
      const bg = t.isAbsent ? '#fee' : (ROL_BG[t.rol]||'#f5f5f2');
      const tc = t.isAbsent ? '#c0392b' : (ROL_TC[t.rol]||'#333');
      setmanaHtml += `<div class="mes-torn${t.isAbsent?' absent-row':''}" style="background:${bg};color:${tc}">
        <span class="mes-torn-dia">${DIES[ds]} ${d.getDate()}/${d.getMonth()+1}</span>
        <span class="mes-torn-loc">${t.loc.nom}</span>
        <span style="font-size:10px;padding:2px 5px;border-radius:4px;${t.torn==='Migdia'?'background:#FFF9DB;color:#854F0B':'background:#E8EAF6;color:#283593'}">${t.torn}</span>
        <span class="mes-torn-info">${t.ini} – ${t.fi}${t.isAbsent?' · ABSENT/A':''}</span>
      </div>`;
    });
  });

  if(setmanaHtml) html += `<div class="mes-setmana">${setmanaHtml}</div>`;
  if(!html) html = '<div class="p-empty">Sense torns assignats aquest mes.</div>';

  const hores = Math.floor(totalMins/60);
  const mins  = totalMins % 60;
  html += `<div class="mes-total">Total hores treballades: ${hores}h ${mins>0?mins+'min':''}</div>`;
  cont.innerHTML = html;
}

function printMes(){
  const nom = document.getElementById('mes-persona-sel').value || 'Treballador';
  const d = new Date(); d.setMonth(d.getMonth()+mesOffset);
  const periode = MESOS_LLARGS[d.getMonth()] + ' ' + d.getFullYear();

    <style>

      h2{color:#0F6E56;margin-bottom:2px}p{color:#888;font-size:11px;margin-bottom:16px}
      .mes-setmana{margin-bottom:12px}
      .mes-setmana-hdr{font-size:10px;font-weight:700;text-transform:uppercase;color:#fff;background:#1D9E75;padding:4px 8px;border-radius:4px;margin-bottom:5px}
      .mes-torn{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:4px;margin-bottom:2px;font-size:11px}
      .mes-torn.absent-row{opacity:.6;text-decoration:line-through;background:#fee!important;color:#c0392b!important}

      .p-empty{color:#aaa;text-align:center;padding:2rem}

// ── HORARI PER PERSONA ────────────────────────────────────────────
let personaWeekOffset = 0;

function openHorariPersona(){
  personaWeekOffset = weekOffset;
  const sel = document.getElementById('persona-sel');
  const noms = getAllKnownNames();
  sel.innerHTML = '<option value="">— Selecciona un treballador —</option>' +
    noms.map(n=>`<option value="${n}">${n}</option>`).join('');
  renderPersonaWeek();
  document.getElementById('persona-overlay').classList.add('open');
}

function closePersonaModal(){
  document.getElementById('persona-overlay').classList.remove('open');
}

function changePersonaWeek(n){
  personaWeekOffset += n;
  renderPersonaWeek();
  renderPersona();
}

function renderPersonaWeek(){
  const ws = weekStart(personaWeekOffset);
  const we = new Date(ws); we.setDate(ws.getDate()+6);
  document.getElementById('persona-week-lbl').textContent =
    `${ws.getDate()} ${MESOS[ws.getMonth()]} – ${we.getDate()} ${MESOS[we.getMonth()]} ${we.getFullYear()}`;
}

function renderPersona(){
  const nom = document.getElementById('persona-sel').value;
  const cont = document.getElementById('persona-content');
  if(!nom){ cont.innerHTML = '<div class="p-empty">Selecciona un treballador per veure el seu horari.</div>'; return; }

  const ws = weekStart(personaWeekOffset);
  let totalMins = 0;
  let html = '';

  DIES.forEach((dia, di)=>{
    const d = new Date(ws); d.setDate(ws.getDate()+di);
    const dk = dateKey(d);
    const ds = getDiaSem(d);

    const tornsDelDia = [];
    LOCS.forEach(loc=>{
      TORNS.forEach(torn=>{
        const fs = fixosData.filter(w=>w.nom===nom&&w.loc_id===loc.id&&w.torn===torn&&w.dia_setmana===ds);
        const es = extresData.filter(w=>w.nom===nom&&w.loc_id===loc.id&&w.torn===torn&&w.data_dia===dk);
        ;[...fs,...es].forEach(w=>{
          const ini = w.hora_ini.split(':').map(Number);
          const fi  = w.hora_fi.split(':').map(Number);
          let fiMins = fi[0]*60+fi[1];
          if(fiMins === 0) fiMins = 24*60;
          const mins = fiMins - (ini[0]*60+ini[1]);
          totalMins += mins > 0 ? mins : 0;
          tornsDelDia.push({loc, torn, ini:w.hora_ini, fi:w.hora_fi, rol:w.rol, mins});
        });
      });
    });

    if(!tornsDelDia.length) return;

    html += `<div class="p-day">
      <div class="p-day-header">${dia} ${d.getDate()}/${d.getMonth()+1}</div>`;
    tornsDelDia.forEach(t=>{
      const bg = ROL_BG[t.rol]||'#f5f5f2';
      const tc = ROL_TC[t.rol]||'#333';
      const tornStyle = t.torn==='Migdia'?'background:#FFF9DB;color:#854F0B':'background:#E8EAF6;color:#283593';
      html += `<div class="p-torn" style="background:${bg};color:${tc}">
        <div class="chip-dot" style="background:${ROL_COLOR[t.rol]}"></div>
        <span class="p-torn-loc">${t.loc.nom}</span>
        <span style="font-size:10px;padding:2px 6px;border-radius:4px;${tornStyle}">${t.torn}</span>
        <span class="p-torn-info">${t.ini} – ${t.fi}</span>
      </div>`;
    });
    html += '</div>';
  });

  if(!html) html = '<div class="p-empty">Sense torns assignats aquesta setmana.</div>';

  const hores = Math.floor(totalMins/60);
  const mins  = totalMins % 60;
  html += `<div class="p-total">Total setmana: ${hores}h ${mins>0?mins+'min':''}</div>`;
  cont.innerHTML = html;
}

function printPersona(){
  const nom = document.getElementById('persona-sel').value || 'Treballador';
  const ws = weekStart(personaWeekOffset);
  const we = new Date(ws); we.setDate(ws.getDate()+6);
  const periode = `${ws.getDate()}/${ws.getMonth()+1} – ${we.getDate()}/${we.getMonth()+1}/${we.getFullYear()}`;
  const contingut = document.getElementById('persona-content').innerHTML;
  const win = window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>Horari ${nom}</title>

      body{font-family:Arial,sans-serif;font-size:13px;color:#1a1a1a;padding:20px}

    </style></head><body>
    <h2>Horari de ${nom}</h2>

    ${contingut}
    </body></html>`);
  win.document.close();
  win.print();
}

// ── DRAG & DROP ───────────────────────────────────────────────
let dragSrc = null;

function onDragStart(e){
  dragSrc = e.currentTarget;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('drag-over'));
  if(e.currentTarget !== dragSrc) e.currentTarget.classList.add('drag-over');
}

function onDragEnd(e){
  document.querySelectorAll('.chip').forEach(c=>{
    c.classList.remove('dragging');
    c.classList.remove('drag-over');
  });
  dragSrc = null;
}

async function onDrop(e){
  e.preventDefault();
  e.stopPropagation();
  const target = e.currentTarget;
  if(!dragSrc || dragSrc === target) return;

  // Recollim els chips del mateix day-cell
  const cell = target.closest('.day-cell');
  const chips = [...cell.querySelectorAll('.chip')];
  const srcIdx = chips.indexOf(dragSrc);
  const tgtIdx = chips.indexOf(target);
  if(srcIdx === -1 || tgtIdx === -1) return;

  // Reordenem localment per calcular el nou ordre
  const reordered = [...chips];
  reordered.splice(srcIdx, 1);
  reordered.splice(tgtIdx, 0, dragSrc);

  // Actualitzem l'ordre a Supabase
  const updates = reordered.map((chip, i) => ({
    id: chip.dataset.id,
    tipus: chip.dataset.tipus,
    ordre: i
  }));

  await Promise.all(updates.map(u => {
    const table = u.tipus === 'fix' ? 'fixos' : 'extres';
    return sb.from(table).update({ordre: u.ordre}).eq('id', u.id);
  }));

  await loadData();
}

// ── AUTOCOMPLETAR ─────────────────────────────────────────────────
function getAllKnownNames(){
  const noms = new Set();
  fixosData.forEach(w=>noms.add(w.nom));
  extresData.forEach(w=>noms.add(w.nom));
  return [...noms].sort((a,b)=>a.localeCompare(b,'ca'));
}

let acActiveIdx = -1;

function onNomInput(){
  const val = document.getElementById('m-nom').value.trim().toLowerCase();
  const list = document.getElementById('ac-list');
  acActiveIdx = -1;
  if(!val){ list.classList.remove('open'); list.innerHTML=''; return; }
  const matches = getAllKnownNames().filter(n=>n.toLowerCase().includes(val));
  if(!matches.length){ list.classList.remove('open'); list.innerHTML=''; return; }
  list.innerHTML = matches.map((n,i)=>`<div class="ac-item" data-idx="${i}" onmousedown="pickName('${n.replace(/'/g,"\'")}')">${n}</div>`).join('');
  list.classList.add('open');
}

function pickName(nom){
  document.getElementById('m-nom').value = nom;
  document.getElementById('ac-list').classList.remove('open');
  document.getElementById('ac-list').innerHTML = '';
  acActiveIdx = -1;
}

function onNomKey(e){
  const list = document.getElementById('ac-list');
  const items = list.querySelectorAll('.ac-item');
  if(!list.classList.contains('open')) return;
  if(e.key==='ArrowDown'){
    e.preventDefault();
    acActiveIdx = Math.min(acActiveIdx+1, items.length-1);
    items.forEach((el,i)=>el.classList.toggle('active',i===acActiveIdx));
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    acActiveIdx = Math.max(acActiveIdx-1, 0);
    items.forEach((el,i)=>el.classList.toggle('active',i===acActiveIdx));
  } else if(e.key==='Enter' && acActiveIdx>=0){
    e.preventDefault();
    e.stopPropagation();
    pickName(items[acActiveIdx].textContent);
  } else if(e.key==='Escape'){
    list.classList.remove('open');
  }
}

document.addEventListener('click', function(e){
  if(!e.target.closest('.ac-wrap')){
    document.getElementById('ac-list').classList.remove('open');
  }
});

// ── EVENTS ────────────────────────────────────────────────────────
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.getElementById('copy-overlay').addEventListener('click',function(e){if(e.target===this)closeCopyModal()});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeCopyModal();closePersonaModal();closeMesModal()}
  if(e.key==='Enter'&&pending&&!editingId) saveWorker();
});
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
