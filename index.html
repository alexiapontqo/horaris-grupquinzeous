<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horari Setmanal — Grup Quinze Ous</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;color:#1a1a1a;background:#f5f5f2}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f2}
.login-box{background:#fff;border:1px solid #ddd;border-radius:12px;padding:2.5rem 2rem;width:340px;max-width:95vw}
.login-logo{text-align:center;margin-bottom:1.75rem}
.login-logo div{font-size:22px;font-weight:700;color:#0F6E56}
.login-logo p{font-size:12px;color:#888;margin-top:4px}
.login-box label{display:block;font-size:11px;color:#666;margin-bottom:4px;margin-top:14px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.login-box input{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px;outline:none;transition:border .15s}
.login-box input:focus{border-color:#1D9E75}
.login-btn{width:100%;margin-top:20px;padding:11px;background:#0F6E56;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.login-btn:hover{background:#085041}
.login-error{color:#c0392b;font-size:12px;margin-top:10px;text-align:center;min-height:18px}
.login-box .hint{font-size:11px;color:#aaa;text-align:center;margin-top:16px;line-height:1.6}

/* ── APP ── */
#app{display:none}
header{background:#0F6E56;color:#fff;padding:12px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
header h1{font-size:16px;font-weight:700;flex:1;white-space:nowrap}
.week-nav{display:flex;align-items:center;gap:6px}
.week-label{font-size:12px;font-weight:600;min-width:170px;text-align:center}
.hbtn{padding:5px 12px;border:1px solid rgba(255,255,255,.35);border-radius:6px;background:transparent;color:#fff;cursor:pointer;font-size:12px}
.hbtn:hover{background:rgba(255,255,255,.15)}
.user-badge{font-size:11px;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:6px}
.user-badge span{font-weight:600}
.logout-btn{font-size:11px;background:transparent;border:none;color:rgba(255,255,255,.7);cursor:pointer;padding:2px 4px}
.logout-btn:hover{color:#fff}

.legend{display:flex;gap:12px;padding:10px 18px;background:#fff;border-bottom:1px solid #e5e5e0;flex-wrap:wrap;align-items:center}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
.leg-dot{width:9px;height:9px;border-radius:50%}
.leg-box{width:16px;height:10px;border-radius:2px}
.leg-sep{width:1px;height:14px;background:#ddd}

.main{padding:14px 18px;overflow-x:auto}
table{border-collapse:collapse;width:100%;min-width:700px}
th{padding:7px 8px;font-size:11px;font-weight:700;text-align:left;border:1px solid #ddd;white-space:nowrap;letter-spacing:.03em}
td{border:1px solid #e0e0d8;vertical-align:top;padding:0}
.th-loc{background:#0F6E56;color:#fff;width:108px;text-transform:uppercase;font-size:10px}
.th-torn{background:#1D9E75;color:#fff;width:65px;text-align:center;text-transform:uppercase;font-size:10px}
.th-dia{background:#E1F5EE;color:#085041;text-align:center;min-width:105px}
.th-dia small{font-weight:400;font-size:10px;display:block}
.loc-cell{padding:10px 8px;font-weight:700;font-size:12px;vertical-align:middle;text-align:center;line-height:1.4}
.loc-cell small{font-weight:400;font-size:10px;display:block;margin-top:3px;opacity:.7}
.torn-cell{padding:6px 8px;font-size:10px;font-weight:700;text-align:center;vertical-align:middle;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.torn-migdia{background:#FFF9DB;color:#854F0B}
.torn-nit{background:#E8EAF6;color:#283593}
.day-cell{padding:5px 6px;min-height:42px;vertical-align:top}
.chip{display:flex;align-items:center;gap:4px;padding:3px 6px;border-radius:5px;margin-bottom:3px;font-size:11px}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chip-name{font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72px}
.chip-hores{font-size:10px;opacity:.75;white-space:nowrap}
.chip-badge{font-size:9px;padding:1px 4px;border-radius:3px;background:rgba(0,0,0,.08);font-weight:700;margin-left:2px;white-space:nowrap}
.chip-del{margin-left:2px;opacity:.35;font-size:11px;cursor:pointer;padding:0 2px;flex-shrink:0;background:none;border:none;color:inherit}
.chip-del:hover{opacity:1}
.add-btn{display:flex;align-items:center;gap:3px;padding:3px 6px;border:1px dashed #bbb;border-radius:5px;font-size:11px;color:#aaa;cursor:pointer;margin-top:2px;background:transparent;transition:all .12s;width:100%}
.add-btn:hover{border-color:#1D9E75;color:#0F6E56;background:#E1F5EE}
.loc-sep td{height:5px;background:#d0d0c8;padding:0}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.5rem;width:340px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:3px}
.modal-sub{font-size:12px;color:#888;margin-bottom:1.1rem}
.type-toggle{display:flex;border:1px solid #ddd;border-radius:6px;overflow:hidden;margin-bottom:10px}
.type-opt{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;color:#888;background:#fff;border:none}
.type-opt.active-fix{background:#E1F5EE;color:#085041}
.type-opt.active-extra{background:#FFF9DB;color:#854F0B}
.fix-info{font-size:11px;color:#666;background:#f5f5f2;border-radius:6px;padding:8px 10px;margin-bottom:10px;line-height:1.55}
.frow{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.frow label{font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.frow input,.frow select{padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;outline:none;width:100%;background:#fff;color:#1a1a1a}
.frow input:focus,.frow select:focus{border-color:#1D9E75}
.row2{display:flex;gap:10px}
.row2 .frow{flex:1}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.mbtn{padding:7px 16px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#333;cursor:pointer;font-size:13px;font-weight:600}
.mbtn.ok{background:#0F6E56;border-color:#0F6E56;color:#fff}
.mbtn.ok:hover{background:#085041}

/* ── ADMIN PANEL ── */
#admin-panel{display:none;background:#fff;border-bottom:1px solid #e5e5e0;padding:10px 18px}
.admin-users{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.admin-users span{font-size:12px;font-weight:700;color:#555;margin-right:4px}
.user-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid #ddd;border-radius:20px;font-size:11px;background:#f9f9f7}
.user-pill .u-loc{color:#888}
.user-pill .u-pw{color:#aaa;font-family:monospace}

@media print{header .week-nav,.hbtn,.add-btn,.chip-del,.legend button,.logout-btn,#admin-panel{display:none!important}body{background:#fff}.main{padding:6px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div>Restaurants & Càterings</div>
      <p>Gestió d'horaris setmanals</p>
    </div>
    <label>Usuari</label>
    <input type="text" id="login-user" placeholder="Escriu el teu usuari" autocomplete="username">
    <label>Contrasenya</label>
    <input type="password" id="login-pass" placeholder="Contrasenya" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-err"></div>
    <div class="hint">Contacta amb l'administrador<br>si no recordes les teves credencials.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <h1>Horari Setmanal</h1>
    <div class="week-nav">
      <button class="hbtn" id="btn-prev" onclick="changeWeek(-1)">&#8592;</button>
      <div class="week-label" id="week-lbl"></div>
      <button class="hbtn" id="btn-next" onclick="changeWeek(1)">&#8594;</button>
    </div>
    <button class="hbtn" onclick="window.print()">Imprimir</button>
    <div class="user-badge">
      <span id="user-display"></span>
      <button class="logout-btn" onclick="doLogout()">&#10005; Sortir</button>
    </div>
  </header>

  <div id="admin-panel">
    <div class="admin-users">
      <span>Usuaris:</span>
      <div id="users-list"></div>
    </div>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#3b82f6"></div>Cuina</div>
    <div class="leg-item"><div class="leg-dot" style="background:#10b981"></div>Sala</div>
    <div class="leg-item"><div class="leg-dot" style="background:#a855f7"></div>Neteja</div>
    <div class="leg-sep"></div>
    <div class="leg-item"><div class="leg-box" style="background:#FFF9DB;border:1px solid #FAC775"></div>Migdia</div>
    <div class="leg-item"><div class="leg-box" style="background:#E8EAF6;border:1px solid #9fa8da"></div>Nit</div>
    <div class="leg-sep"></div>
    <div class="leg-item"><div class="leg-box" style="background:#E1F5EE;border-left:2px solid #1D9E75"></div>Fix (totes les setmanes)</div>
    <div class="leg-item"><div class="leg-box" style="background:#FFFBEB;border-left:2px solid #FCD34D"></div>Extra (aquest dia)</div>
  </div>

  <div class="main">
    <table id="main-table"></table>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="frow">
      <label>Tipus</label>
      <div class="type-toggle">
        <button class="type-opt active-fix" id="opt-fix" onclick="setTipus('fix')">Fix — totes les setmanes</button>
        <button class="type-opt" id="opt-extra" onclick="setTipus('extra')">Extra — sols aquest dia</button>
      </div>
    </div>
    <div class="fix-info" id="fix-info"></div>
    <div class="frow"><label>Nom</label><input id="m-nom" placeholder="Nom i cognoms" autocomplete="off"></div>
    <div class="frow"><label>Rol</label>
      <select id="m-rol">
        <option value="cuina">Cuina</option>
        <option value="sala">Sala</option>
        <option value="neteja">Neteja</option>
      </select>
    </div>
    <div class="row2">
      <div class="frow"><label>Inici</label><input id="m-ini" type="time" value="09:00"></div>
      <div class="frow"><label>Fi</label><input id="m-fi" type="time" value="17:00"></div>
    </div>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal()">Cancel·lar</button>
      <button class="mbtn ok" onclick="saveWorker()">Afegir</button>
    </div>
  </div>
</div>

<script>
// ── USUARIS ─────────────────────────────────────────────────────────
// CANVIA LES CONTRASENYES ABANS DE PUBLICAR!
const USERS = {
  alexia:          { pass:'Pont9889',           rol:'admin',       loc:null,         label:'Alèxia' },
  grupquinzeous:   { pass:'grupquinzeous2026',  rol:'visor',       loc:null,         label:'Grup Quinze Ous' },
  quinzeous:       { pass:'quinzeous2026',      rol:'responsable', loc:'quinzeous',  label:'Quinze Ous' },
  quinabarra:      { pass:'quinabarra2026',     rol:'responsable', loc:'quinabarra', label:'Quina Barra' },
  malespina:       { pass:'malespina2026',      rol:'responsable', loc:'malespina',  label:'Malespina' },
  tacollona:       { pass:'tacollona2026',      rol:'responsable', loc:'tacollona',  label:'Tacollona' },
  catqou:          { pass:'catqou2026',         rol:'responsable', loc:'catqou',     label:'Càt. Quinze Ous' },
  foodpork:        { pass:'foodpork2026',       rol:'responsable', loc:'foodpork',   label:'Foodpork' },
};

let currentUser = null;

function doLogin(){
  const u = document.getElementById('login-user').value.trim().toLowerCase();
  const p = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  if(USERS[u] && USERS[u].pass === p){
    currentUser = { username: u, ...USERS[u] };
    err.textContent = '';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-display').textContent = currentUser.label;
    if(currentUser.rol === 'admin'){
      document.getElementById('admin-panel').style.display = 'block';
      renderAdminPanel();
      document.getElementById('btn-prev').style.display = '';
      document.getElementById('btn-next').style.display = '';
    } else {
      document.getElementById('btn-prev').style.display = '';
      document.getElementById('btn-next').style.display = '';
    }
    renderTable();
  } else {
    err.textContent = 'Usuari o contrasenya incorrectes.';
  }
}

function doLogout(){
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

function renderAdminPanel(){
  const ul = document.getElementById('users-list');
  ul.innerHTML = Object.entries(USERS).filter(([k])=>k!=='admin').map(([k,v])=>
    `<div class="user-pill">
      <strong>${v.label}</strong>
      <span class="u-loc">· usuari: <b>${k}</b></span>
      <span class="u-pw">pass: ${v.pass}</span>
    </div>`
  ).join('');
}

// ── DADES ───────────────────────────────────────────────────────────
const LOCS = [
  {id:'quinzeous', nom:'Quinze Ous',      empresa:'Quinze Ous SL',    color:'#0F6E56',bg:'#E1F5EE',tc:'#085041'},
  {id:'quinabarra',nom:'Quina Barra',     empresa:'Quinmaldous SL',   color:'#185FA5',bg:'#E6F1FB',tc:'#0C447C'},
  {id:'malespina', nom:'Malespina',       empresa:'Xalegre SL',       color:'#534AB7',bg:'#EEEDFE',tc:'#26215C'},
  {id:'tacollona', nom:'Tacollona',       empresa:'Quinzeous SL',     color:'#993C1D',bg:'#FAECE7',tc:'#4A1B0C'},
  {id:'catqou',    nom:'Càt. Quinze Ous', empresa:'Quinzeous SL',     color:'#854F0B',bg:'#FAEEDA',tc:'#412402'},
  {id:'foodpork',  nom:'Foodpork',        empresa:'Quinzeous SL',     color:'#993556',bg:'#FBEAF0',tc:'#4B1528'},
];
const TORNS  = ['Migdia','Nit'];
const DIES   = ['Dilluns','Dimarts','Dimecres','Dijous','Divendres','Dissabte','Diumenge'];
const MESOS  = ['gen','feb','mar','abr','mai','jun','jul','ago','set','oct','nov','des'];

const ROL_COLOR = {cuina:'#3b82f6', sala:'#10b981', neteja:'#a855f7'};
const ROL_BG    = {cuina:'#DBEAFE', sala:'#D1FAE5', neteja:'#F3E8FF'};
const ROL_TC    = {cuina:'#1e40af', sala:'#065f46', neteja:'#6b21a8'};

// Emmagatzematge: localStorage per persistir dades
let fixos  = JSON.parse(localStorage.getItem('horari_fixos')  || '{}');
let extres = JSON.parse(localStorage.getItem('horari_extres') || '{}');

function saveData(){
  localStorage.setItem('horari_fixos',  JSON.stringify(fixos));
  localStorage.setItem('horari_extres', JSON.stringify(extres));
}

// ── SETMANA ─────────────────────────────────────────────────────────
let weekOffset = 0;

function weekStart(off){
  const d = new Date(); d.setHours(0,0,0,0);
  const dow = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (dow===0?6:dow-1) + off*7);
  return mon;
}
function dateKey(d){ return d.toISOString().split('T')[0] }
function getDayDate(di){
  const ws = weekStart(weekOffset);
  const d = new Date(ws); d.setDate(ws.getDate()+di);
  return d;
}
function fixKey(locId,torn,diaSem){ return `${locId}|${torn}|${diaSem}` }
function extraKey(locId,torn,dk){  return `${locId}|${torn}|${dk}` }

function getWorkers(locId,torn,di){
  const d = getDayDate(di);
  const dk = dateKey(d);
  const diaSem = d.getDay()===0?6:d.getDay()-1;
  const fs = (fixos[fixKey(locId,torn,diaSem)]  ||[]).map(w=>({...w,tipus:'fix'}));
  const es = (extres[extraKey(locId,torn,dk)]   ||[]).map(w=>({...w,tipus:'extra'}));
  return [...fs,...es];
}

function changeWeek(n){ weekOffset+=n; renderTable(); }

function fmtWeek(){
  const ws = weekStart(weekOffset);
  const we = new Date(ws); we.setDate(ws.getDate()+6);
  return `${ws.getDate()} ${MESOS[ws.getMonth()]} – ${we.getDate()} ${MESOS[we.getMonth()]} ${we.getFullYear()}`;
}

// ── RENDER ──────────────────────────────────────────────────────────
function renderTable(){
  document.getElementById('week-lbl').textContent = fmtWeek();
  const isAdmin = currentUser && currentUser.rol === 'admin';
  const isVisor = currentUser && currentUser.rol === 'visor';
  const myLoc   = currentUser ? currentUser.loc : null;

  const visibleLocs = (isAdmin || isVisor) ? LOCS : LOCS.filter(l => l.id === myLoc);

  const ws = weekStart(weekOffset);
  let html = '<thead><tr>';
  html += `<th class="th-loc">Establiment</th><th class="th-torn">Torn</th>`;
  DIES.forEach((d,i)=>{
    const day = new Date(ws); day.setDate(ws.getDate()+i);
    html += `<th class="th-dia">${d}<small>${day.getDate()}/${day.getMonth()+1}</small></th>`;
  });
  html += '</tr></thead><tbody>';

  visibleLocs.forEach((loc, li)=>{
    TORNS.forEach((torn, ti)=>{
      html += '<tr>';
      if(ti===0){
        html += `<td class="loc-cell" rowspan="2" style="background:${loc.bg};color:${loc.tc};border-left:3px solid ${loc.color}">
          ${loc.nom}<small>${loc.empresa}</small>
        </td>`;
      }
      const tc = torn==='Migdia'?'torn-migdia':'torn-nit';
      html += `<td class="torn-cell ${tc}">${torn}</td>`;
      DIES.forEach((_,di)=>{
        const workers = getWorkers(loc.id,torn,di);
        const d = getDayDate(di);
        const dk = dateKey(d);
        const diaSem = d.getDay()===0?6:d.getDay()-1;
        html += `<td class="day-cell">`;
        workers.forEach((w,wi)=>{
          const isFix = w.tipus==='fix';
          const chipStyle = isFix
            ? `background:${ROL_BG[w.rol]};color:${ROL_TC[w.rol]};border-left:2px solid ${ROL_COLOR[w.rol]}`
            : `background:#FFFBEB;color:#92400e;border-left:2px solid #FCD34D`;
          const delData = isFix
            ? `data-tipus="fix" data-loc="${loc.id}" data-torn="${torn}" data-dia="${diaSem}" data-idx="${wi}"`
            : `data-tipus="extra" data-loc="${loc.id}" data-torn="${torn}" data-dk="${dk}" data-idx="${wi}"`;
          html += `<div class="chip" style="${chipStyle}">
            <div class="chip-dot" style="background:${ROL_COLOR[w.rol]}"></div>
            <span class="chip-name" title="${w.nom}">${w.nom}</span>
            <span class="chip-hores">${w.ini}-${w.fi}</span>
            <span class="chip-badge">${isFix?'fix':'extra'}</span>
            ${isAdmin?`<button class="chip-del" ${delData} onclick="delWorker(this)">&#10005;</button>`:''}
          </div>`;
        });
        if(isAdmin){
          html += `<button class="add-btn" onclick="openModal('${loc.id}','${torn}',${di})">+ afegir</button>`;
        }
        html += `</td>`;
      });
      html += '</tr>';
    });
    if(li < visibleLocs.length-1){
      html += `<tr class="loc-sep"><td colspan="${2+DIES.length}"></td></tr>`;
    }
  });
  html += '</tbody>';
  document.getElementById('main-table').innerHTML = html;
}

// ── MODAL ───────────────────────────────────────────────────────────
let pending = null;
let tipusActual = 'fix';

function openModal(locId,torn,di){
  const d = getDayDate(di);
  const loc = LOCS.find(l=>l.id===locId);
  pending = { locId, torn, di, dk:dateKey(d), diaSem:d.getDay()===0?6:d.getDay()-1 };
  document.getElementById('modal-title').textContent = `${loc.nom} · ${torn}`;
  document.getElementById('modal-sub').textContent   = `${DIES[di]}, ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
  document.getElementById('m-nom').value = '';
  setTipus('fix');
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-nom').focus(),60);
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  pending = null;
}

function setTipus(t){
  tipusActual = t;
  document.getElementById('opt-fix').className   = 'type-opt' + (t==='fix'  ?' active-fix':'');
  document.getElementById('opt-extra').className = 'type-opt' + (t==='extra'?' active-extra':'');
  document.getElementById('fix-info').innerHTML = t==='fix'
    ? 'Apareixerà a <strong>totes les setmanes</strong> en aquest lloc, torn i dia de la setmana.'
    : 'Apareixerà <strong>únicament aquest dia</strong> concret.';
}

function saveWorker(){
  if(!pending) return;
  const nom = document.getElementById('m-nom').value.trim();
  if(!nom) return;
  const w = {
    nom, rol:document.getElementById('m-rol').value,
    ini:document.getElementById('m-ini').value||'09:00',
    fi:document.getElementById('m-fi').value||'17:00'
  };
  if(tipusActual==='fix'){
    const k = fixKey(pending.locId, pending.torn, pending.diaSem);
    if(!fixos[k]) fixos[k]=[];
    fixos[k].push(w);
  } else {
    const k = extraKey(pending.locId, pending.torn, pending.dk);
    if(!extres[k]) extres[k]=[];
    extres[k].push(w);
  }
  saveData();
  closeModal();
  renderTable();
}

function delWorker(el){
  if(el.dataset.tipus==='fix'){
    const k = fixKey(el.dataset.loc, el.dataset.torn, +el.dataset.dia);
    if(fixos[k]) fixos[k].splice(+el.dataset.idx,1);
  } else {
    const k = extraKey(el.dataset.loc, el.dataset.torn, el.dataset.dk);
    if(extres[k]) extres[k].splice(+el.dataset.idx,1);
  }
  saveData();
  renderTable();
}

// ── EVENTS ──────────────────────────────────────────────────────────
document.getElementById('modal-overlay').addEventListener('click', function(e){
  if(e.target===this) closeModal();
});
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeModal();
  if(e.key==='Enter' && pending) saveWorker();
});
document.getElementById('login-pass').addEventListener('keydown', e=>{
  if(e.key==='Enter') doLogin();
});
</script>
</body>
